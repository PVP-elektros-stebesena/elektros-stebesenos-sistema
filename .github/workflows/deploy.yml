name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            REPO_DIR=/var/www/elektros-stebesenos-sistema

            # --- Pull latest code ---
            cd $REPO_DIR
            git pull origin main

            # --- Frontend: install, build, reload nginx ---
            cd $REPO_DIR/client
            npm ci
            npm run build
            sudo systemctl reload nginx

            # --- Backend: install, migrate, build, restart pm2 ---
            cd $REPO_DIR/server
            npm ci --omit=dev
            npx prisma migrate deploy
            npx prisma generate
            npm run build

            pm2 describe server > /dev/null 2>&1 && pm2 restart server || pm2 start dist/src/index.js --name server
            pm2 save

            echo "✅ Deployment complete"
